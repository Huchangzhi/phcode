name: Build and Release PH Code

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (leave empty for nightly build)'
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest

    env:
      NODE_VERSION: '22'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install dependencies
      run: npm ci

    - name: Download w64devkit
      run: |
        $downloadUrl = "https://github.com/skeeto/w64devkit/releases/download/v2.5.0/w64devkit-x64-2.5.0.7z.exe"
        $outputFile = "w64devkit-installer.exe"
        Invoke-WebRequest -Uri $downloadUrl -OutFile $outputFile

    - name: Extract w64devkit
      run: |
        Start-Process -FilePath ".\w64devkit-installer.exe" -ArgumentList "-ow64devkit_extract", "-y" -Wait -NoNewWindow
        if (Test-Path "w64devkit_extract\w64devkit") {
          Move-Item -Path "w64devkit_extract\w64devkit" -Destination "w64devkit" -Force
          Remove-Item -Path "w64devkit_extract" -Recurse -Force
        }
        if (-not (Test-Path "w64devkit\bin\g++.exe")) {
          exit 1
        }

    - name: Determine version
      shell: pwsh
      id: version
      run: |
        if ("${{ inputs.version }}" -ne "") {
          $version = "${{ inputs.version }}"
        } else {
          $version = "nightly"
        }
        if ($version -eq "nightly") {
          $buildTime = (Get-Date).ToUniversalTime().ToString("yyyyMMddHH")
          $version = "nightly-$buildTime"
        }
        $isPrerelease = "false"
        if ($version.StartsWith("nightly-") -or $version.Contains("beta")) {
          $isPrerelease = "true"
        }
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "isPrerelease=$isPrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Delete old nightly release and tag
      if: startsWith(steps.version.outputs.version, 'nightly-')
      shell: pwsh
      run: |
        $releases = gh api repos/:owner/:repo/releases --jq '.[] | select(.tag_name == "nightly") | .id'
        if ($releases) {
          foreach ($releaseId in $releases) {
            gh api --method DELETE repos/:owner/:repo/releases/$releaseId
          }
        }
        $tags = git tag -l "nightly"
        if ($tags) {
          git push origin :refs/tags/nightly
          git tag -d nightly
        }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update version in index.html
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.version }}"
        $filePath = "packages\frontend\index.html"
        $content = Get-Content -Path $filePath -Raw -Encoding UTF8
        $content = $content -replace '<p>web版本</p>', "<p>版本号：$version</p>"
        Set-Content -Path $filePath -Value $content -Encoding UTF8 -NoNewline

    - name: Build packages
      run: |
        npm -w packages/shared run build
        npm -w packages/frontend run build
        npm -w packages/server run build
        npm -w packages/desktop run build

    - name: Package desktop executable
      working-directory: packages/desktop
      run: |
        npm run package -- --target node22-win-x64

    - name: Set icon (resedit API noGrow 不破坏 pkg 快照偏移)
      run: |
        node -e "
        const ResEdit = require('resedit');
        const { readFileSync, writeFileSync } = require('fs');
        const data = readFileSync('packages/desktop/phcode.exe');
        const exe = ResEdit.NtExecutable.from(data);
        const res = ResEdit.NtExecutableResource.from(exe);
        const iconFile = ResEdit.Data.IconFile.from(readFileSync('packages/frontend/public/static/logo.ico'));
        ResEdit.Resource.IconGroupEntry.replaceIconsForResource(res.entries, 1, 1033,
          iconFile.icons.map((item) => item.data));
        res.outputResource(exe, { noGrow: true });
        writeFileSync('packages/desktop/phcode.exe', Buffer.from(exe.generate()));
        console.log('Icon set successfully');
        "

    - name: Sign desktop executable
      shell: pwsh
      run: |
        $certB64 = "${{ secrets.WINDOWS_CODESIGN_CERT }}"
        $certPass = "${{ secrets.WINDOWS_CODESIGN_PASSWORD }}"
        if ($certB64 -and $certPass) {
          $certBytes = [Convert]::FromBase64String($certB64)
          $certPath = Join-Path $env:TEMP "codesign.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          $exePath = Resolve-Path "packages\desktop\phcode.exe"
          & "signtool" sign /fd SHA256 /f $certPath /p $certPass /tr http://timestamp.digicert.com /td SHA256 $exePath
        }

    - name: Create ZIP archive
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.version }}"
        if ($version.StartsWith("nightly-")) {
          $zipFileName = "phcode-$version.zip"
        } else {
          $zipFileName = "phcode-v$version.zip"
        }
        New-Item -ItemType Directory -Name "temp_package" -Force
        Copy-Item "packages\desktop\phcode.exe" -Destination "temp_package\"
        Copy-Item "packages\frontend\dist\*" -Recurse -Destination "temp_package\"
        Copy-Item "templates" -Recurse -Destination "temp_package\"
        Copy-Item "w64devkit" -Recurse -Destination "temp_package\"
        New-Item -ItemType Directory -Name "temp_package\phcode_data" -Force
        Compress-Archive -Path "temp_package\*" -DestinationPath $zipFileName -Force

    - name: Install NSIS
      uses: negrutiu/nsis-install@v2
      with:
        nsis-version: official

    - name: Create installer with NSIS
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.version }}"
        makensis /INPUTCHARSET UTF8 /DVERSION=$version installer.nsi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: phcode-build
        path: |
          *.zip
          *.exe
          packages/desktop/phcode.exe

    - name: Save version info
      run: |
        $version = "${{ steps.version.outputs.version }}"
        Set-Content -Path "version_info.txt" -Value "$version" -Encoding UTF8 -NoNewline

    - name: Upload version info
      uses: actions/upload-artifact@v4
      with:
        name: version-info
        path: version_info.txt
        retention-days: 1

    - name: Generate release notes
      shell: pwsh
      id: release_notes
      run: |
        $version = "${{ steps.version.outputs.version }}"
        $notes = ""
        if ($version.StartsWith("nightly-")) {
          $notes = "## PH Code Nightly Build"
        } elseif ($version -like "*beta*") {
          $notes = "## PH Code Beta build"
        } else {
          $notes = "## PH Code 稳定版本"
        }
        "notes=$notes" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Create Release
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.version }}"
        $notes = "${{ steps.release_notes.outputs.notes }}"
        $isPrerelease = "${{ steps.version.outputs.isPrerelease }}"
        if ($version.StartsWith("nightly-")) {
          $tagName = "nightly"
          $releaseName = "Nightly Build - $version"
          $zipFile = "phcode-$version.zip"
          $installerFile = "phcode-installer-$version.exe"
        } else {
          $tagName = "v$version"
          $releaseName = "Release v$version"
          $zipFile = "phcode-v$version.zip"
          $installerFile = "phcode-installer-$version.exe"
        }
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -f $tagName
        git push -f origin $tagName
        gh release create $tagName --title "$releaseName" --notes "$notes" --prerelease=$isPrerelease $zipFile $installerFile
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: version-info

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat version_info.txt | tr -d '\n\r' | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == nightly-* ]]; then
            TAG_NAME="nightly"
          else
            TAG_NAME="v$VERSION"
          fi
          echo "tagName=$TAG_NAME" >> $GITHUB_OUTPUT
          VC=$(git rev-list --count HEAD)
          echo "versionCode=$VC" >> $GITHUB_OUTPUT

      - name: Prepare assets
        run: |
          npm ci
          npm -w packages/shared run build
          npm -w packages/frontend run build
          mkdir -p packages/android-app/app/src/main/assets
          cp -r packages/frontend/dist/* packages/android-app/app/src/main/assets/
          find packages/android-app/app/src/main/assets -name "*.html" -exec sed -i 's|src="/static/|src="static/|g; s|href="/static/|href="static/|g' {} \;
          find packages/android-app/app/src/main/assets -name "*.js" -exec sed -i "s|'/static/|'static/|g; s|\"/static/|\"static/|g; s|\`/static/|\`static/|g" {} \;
          find packages/android-app/app/src/main/assets -name "*.js" -exec sed -i "s|fetch('/static/|fetch('static/|g; s|fetch(\"/static/|fetch(\"static/|g" {} \;
          echo '${{ steps.get_version.outputs.version }}' > packages/android-app/app/src/main/assets/assets_version.txt

      - name: Inject version into build.gradle
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          VC="${{ steps.get_version.outputs.versionCode }}"
          sed -i "s/versionCode 1/versionCode $VC/" packages/android-app/app/build.gradle
          sed -i "s/versionName \"1.0.0\"/versionName \"$VERSION\"/" packages/android-app/app/build.gradle

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create Gradle Wrapper
        run: |
          cd packages/android-app
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v9.5.1/gradle/wrapper/gradle-wrapper.jar"
          curl -L -o gradlew \
            "https://raw.githubusercontent.com/gradle/gradle/v9.5.1/gradlew"
          chmod +x gradlew

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            echo "$ANDROID_KEYSTORE" | tr -d '\n\r ' | base64 -d > packages/android-app/app/phcode.keystore
          fi

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd packages/android-app
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PHCODE-android
          path: packages/android-app/app/build/outputs/apk/release/*.apk

      - name: Upload APK to Release
        run: |
          tagName="${{ steps.get_version.outputs.tagName }}"
          for apk in packages/android-app/app/build/outputs/apk/release/*.apk; do
            apk_name="PHCODE-$(basename "$apk")"
            cp "$apk" "$apk_name"
            gh release delete-asset "$tagName" "$apk_name" --yes 2>/dev/null || true
            gh release upload "$tagName" "$apk_name"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android-lite:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: version-info

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat version_info.txt | tr -d '\n\r' | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == nightly-* ]]; then
            TAG_NAME="nightly"
          else
            TAG_NAME="v$VERSION"
          fi
          echo "tagName=$TAG_NAME" >> $GITHUB_OUTPUT
          VC=$(git rev-list --count HEAD)
          echo "versionCode=$VC" >> $GITHUB_OUTPUT

      - name: Prepare assets
        run: |
          npm ci
          npm -w packages/shared run build
          npm -w packages/frontend run build
          mkdir -p packages/android-lite/app/src/main/assets
          cp -r packages/frontend/dist/* packages/android-lite/app/src/main/assets/
          find packages/android-lite/app/src/main/assets -name "*.html" -exec sed -i 's|src="/static/|src="static/|g; s|href="/static/|href="static/|g' {} \;
          find packages/android-lite/app/src/main/assets -name "*.js" -exec sed -i "s|'/static/|'static/|g; s|\"/static/|\"static/|g; s|\`/static/|\`static/|g" {} \;
          find packages/android-lite/app/src/main/assets -name "*.js" -exec sed -i "s|fetch('/static/|fetch('static/|g; s|fetch(\"/static/|fetch(\"static/|g" {} \;
          echo '${{ steps.get_version.outputs.version }}' > packages/android-lite/app/src/main/assets/assets_version.txt

      - name: Inject version into build.gradle
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          VC="${{ steps.get_version.outputs.versionCode }}"
          sed -i "s/versionCode 1/versionCode $VC/" packages/android-lite/app/build.gradle
          sed -i "s/versionName \"1.0.0\"/versionName \"$VERSION\"/" packages/android-lite/app/build.gradle

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create Gradle Wrapper
        run: |
          cd packages/android-lite
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar"
          curl -L -o gradlew \
            "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew"
          chmod +x gradlew

      - name: Build APK
        run: |
          cd packages/android-lite
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PHCODE-android-lite
          path: packages/android-lite/app/build/outputs/apk/release/*.apk

      - name: Upload APK to Release
        run: |
          tagName="${{ steps.get_version.outputs.tagName }}"
          for apk in packages/android-lite/app/build/outputs/apk/release/*.apk; do
            apk_name="PHCODE-android-lite.apk"
            cp "$apk" "$apk_name"
            gh release delete-asset "$tagName" "$apk_name" --yes 2>/dev/null || true
            gh release upload "$tagName" "$apk_name"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
